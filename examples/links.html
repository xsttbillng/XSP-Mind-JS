<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XSP-Mind-JS - 多条汇入连线</title>
  <link rel="stylesheet" href="../src/xsp-mind.css" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; }
    .layout { display: flex; width: 100%; height: 100%; }
    .sidebar {
      width: 240px; flex: 0 0 240px; box-sizing: border-box; border-right: 1px solid #e5e7eb;
      background: #f8fafc; padding: 16px 12px; overflow: auto;
    }
    .sidebar h3 { margin: 0 0 12px 0; font-size: 14px; color: #111827; }
    .nav-list { display: flex; flex-direction: column; gap: 8px; }
    .nav-item {
      display: block; padding: 10px 12px; border-radius: 8px; color: #334155;
      text-decoration: none; font-size: 13px; line-height: 1.4; background: transparent;
    }
    .nav-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 700; }
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
    .head { padding: 12px 14px; font-size: 14px; color: #333; border-bottom: 1px solid #eee; }
    .legend {
      display: flex; gap: 14px; flex-wrap: wrap; padding: 8px 12px;
      background: #f8fafc; border-bottom: 1px solid #e5e7eb; font-size: 12px; color: #475569;
    }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    #mind-root-links { flex: 1; min-height: 280px; background: #fafafa; }
    pre.code {
      margin: 0; padding: 10px 12px; background: #0b1020; color: #cbd5e1;
      font-size: 11px; line-height: 1.45; border-top: 1px solid #1e293b; overflow: auto;
      max-height: 180px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h3>例子列表</h3>
      <nav class="nav-list">
        <a class="nav-item" href="../index.html">← 项目首页</a>
        <a class="nav-item" href="./index.html">示例目录</a>
        <a class="nav-item" href="./basic.html">示例1：基础 JSON 渲染</a>
        <a class="nav-item" href="./editable.html">示例2：可编辑 + 实时 JSON</a>
        <a class="nav-item" href="./styled-nodes.html">示例3：节点样式 / CSS 主题</a>
        <a class="nav-item" href="./events.html">示例4：点击触发 JS</a>
        <a class="nav-item" href="./html-safety.html">示例5：HTML 安全 / sanitize</a>
        <a class="nav-item" href="./layouts.html">示例6：布局模式对比</a>
        <a class="nav-item" href="./animated-lines.html">示例7：连线虚线流动</a>
        <a class="nav-item" href="./line-styles.html">示例8：线型与多色连线</a>
        <a class="nav-item" href="./themes.html">示例9：内置主题</a>
        <a class="nav-item" href="./config-builder.html">示例10：配置生成器</a>
        <a class="nav-item" href="./productivity.html">示例11：效率增强</a>
        <a class="nav-item active" href="./links.html">示例12：多条汇入连线</a>
      </nav>
    </aside>
    <main class="main">
      <div class="head">
        示例12：A / B / C 三条线汇入同一节点「汇聚点」（`links` 字段，与树形 items 独立）
      </div>
      <div class="legend">
        <span><i class="dot" style="background:#2563eb"></i>A → 汇聚 · 蓝色曲线</span>
        <span><i class="dot" style="background:#dc2626"></i>B → 汇聚 · 红色折线</span>
        <span><i class="dot" style="background:#64748b"></i>C → 汇聚 · 灰色虚线</span>
      </div>
      <div id="mind-root-links">
        <svg id="mind-svg-links" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <pre class="code" id="jsonOut"></pre>
    </main>
  </div>
  <script src="../vendor/svg.min.js"></script>
  <script src="../src/xsp-mind.js"></script>
  <script>
    const payload = {
      option: { layout: "none", fitMode: "expand", fillContainer: true },
      data: [
        {
          text: "流程入口",
          id: "root",
          x: 40,
          y: 180,
          width: 120,
          items: [
            { text: "来源 A", id: "a", x: 240, y: 60, items: [] },
            { text: "来源 B", id: "b", x: 240, y: 180, items: [] },
            { text: "来源 C", id: "c", x: 240, y: 300, items: [] },
            { text: "汇聚点", id: "hub", x: 500, y: 180, width: 120, height: 44, items: [] }
          ]
        }
      ],
      links: [
        { from: "a", to: "hub", linestyle: "sline", linecolor: "#2563eb", linearrow: "triangle" },
        { from: "b", to: "hub", linestyle: "zline", linecolor: "#dc2626", linetext: "主路", lineanimate: true },
        { from: "c", to: "hub", linestyle: "line", linecolor: "#64748b", linedash: true, linearrow: "open" }
      ]
    };

    const app = new XSPMindJS("mind-root-links", "mind-svg-links");
    app.initflow(payload);
    document.getElementById("jsonOut").textContent = app.toJSON(true);
  </script>
</body>
</html>
