  <div id="mind-root">

            "y": 80,

            "items": [
              {
                "text": "可传入 JSON",
                "id": "flow-json",
                "x": 600,
                "y": 60,
                "linestyle": "line",
                "items": []
              },
              {
                "text": "可拖拽节点",
                "id": "flow-drag",
                "x": 600,
                "y": 130,
                "linestyle": "zline",
                "items": []
              }
            ]
          },
          {
            "text": "思维导图",
            "id": "mind",
            "x": 320,
            "y": 220,
            "linestyle": "zline",
            "items": [
              {
                "text": "节点可自定义尺寸",
                "id": "mind-size",

                "y": 200,

                "height": 40,

            "y": 330,
            "width": 260,
            "height": 54,
            "linestyle": "sline",
            "items": []
          }
        ]
      }
    ];

    const app = new XSPMindJS("mind-root", "mind-svg");
    app.initflow({
      option: {
        box: { width: 140, height: 36 },
        line: { color: "#00A1E7", width: 1.2 },
        text: { color: "#00A1E7", size: 12 },
        ismove: true,
        pan: true,
        zoom: true,
        allowHtmlText: true
      },
      data
    });
    window.xspMindDemo = app;
  </script>
