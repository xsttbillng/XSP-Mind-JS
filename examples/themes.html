<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XSP-Mind-JS - 内置主题</title>
  <link rel="stylesheet" href="../src/xsp-mind.css" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; }
    .layout { display: flex; width: 100%; height: 100%; }
    .sidebar {
      width: 240px; flex: 0 0 240px; box-sizing: border-box; border-right: 1px solid #e5e7eb;
      background: #f8fafc; padding: 16px 12px; overflow: auto;
    }
    .sidebar h3 { margin: 0 0 12px 0; font-size: 14px; color: #111827; }
    .nav-list { display: flex; flex-direction: column; gap: 8px; }
    .nav-item {
      display: block; padding: 10px 12px; border-radius: 8px; color: #334155;
      text-decoration: none; font-size: 13px; line-height: 1.4; background: transparent;
    }
    .nav-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 700; }
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .toolbar {
      padding: 10px 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid #eee; background: #fff;
    }
    button {
      padding: 6px 14px; cursor: pointer; border: 1px solid #cbd5e1;
      border-radius: 6px; background: #fff; font-size: 13px;
    }
    button.active { font-weight: 700; border-width: 2px; }
    button[data-theme="default"].active { border-color: #00a1e7; color: #00a1e7; }
    button[data-theme="dark"].active { border-color: #1a1f28; background: #1a1f28; color: #5eead4; }
    button[data-theme="athens-blue"].active { border-color: #1e5a8a; color: #1e5a8a; }
    .hint { color: #64748b; font-size: 12px; line-height: 1.5; }
    #mind-root-theme { flex: 1; min-height: 0; width: 100%; }
    pre.code {
      margin: 0; padding: 10px 12px; background: #0b1020; color: #cbd5e1;
      font-size: 11px; line-height: 1.45; border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h3>例子列表</h3>
      <nav class="nav-list">
        <a class="nav-item" href="../index.html">← 项目首页</a>
        <a class="nav-item" href="./index.html">示例目录</a>
        <a class="nav-item" href="./basic.html">示例1：基础 JSON 渲染</a>
        <a class="nav-item" href="./editable.html">示例2：可编辑 + 实时 JSON</a>
        <a class="nav-item" href="./styled-nodes.html">示例3：节点样式 / CSS 主题</a>
        <a class="nav-item" href="./events.html">示例4：点击触发 JS</a>
        <a class="nav-item" href="./html-safety.html">示例5：HTML 安全 / sanitize</a>
        <a class="nav-item" href="./layouts.html">示例6：布局模式对比</a>
        <a class="nav-item" href="./animated-lines.html">示例7：连线虚线流动</a>
        <a class="nav-item" href="./line-styles.html">示例8：线型与多色连线</a>
        <a class="nav-item active" href="./themes.html">示例9：内置主题</a>
        <a class="nav-item" href="./config-builder.html">示例10：配置生成器</a>
        <a class="nav-item" href="./productivity.html">示例11：效率增强</a>
      </nav>
    </aside>
    <main class="main">
      <div style="padding:12px 14px; font-size:14px; color:#333; border-bottom:1px solid #eee;">
        示例9：内置主题 — <code>option.theme</code> 或 <code>app.applyTheme()</code>
      </div>
      <div class="toolbar">
        <button type="button" class="theme-btn active" data-theme="default">默认</button>
        <button type="button" class="theme-btn" data-theme="dark">高级黑</button>
        <button type="button" class="theme-btn" data-theme="athens-blue">雅典蓝</button>
        <span class="hint">引入 <code>xsp-mind.css</code> 即可（已 @import 主题样式）</span>
      </div>
      <div id="mind-root-theme">
        <svg id="mind-svg-theme"></svg>
      </div>
      <pre class="code" id="codeHint">option: { theme: "default" }</pre>
    </main>
  </div>

  <script src="../vendor/svg.min.js"></script>
  <script src="../src/xsp-mind.js"></script>
  <script>
    const data = [
      {
        text: "主题演示",
        id: "root",
        linestyle: "sline",
        items: [
          { text: "节点 A", id: "a", linestyle: "sline", items: [] },
          { text: "节点 B", id: "b", linestyle: "zline", items: [] },
          { text: "节点 C", id: "c", linestyle: "line", items: [] }
        ]
      }
    ];

    const codeHint = document.getElementById("codeHint");
    const themeBtns = document.querySelectorAll(".theme-btn");

    const app = new XSPMindJS("mind-root-theme", "mind-svg-theme");
    app.initflow({
      option: {
        theme: "default",
        box: { width: 130, height: 40 },
        layout: "tree-right",
        layoutGap: { x: 180, y: 22 },
        padding: 48,
        fitMode: "expand",
        autoResize: true,
        ismove: true,
        pan: true,
        zoom: true,
        line: { arrow: true }
      },
      data: JSON.parse(JSON.stringify(data))
    });

    function setActiveBtn(themeId) {
      themeBtns.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.theme === themeId);
      });
      const theme = XSPMindJS.getTheme(themeId);
      codeHint.textContent =
        'option: { theme: "' + themeId + '" }  // ' + theme.name + "\n" +
        "// 或运行时: app.applyTheme('" + themeId + "')";
    }

    themeBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.theme;
        app.applyTheme(id);
        app.resetView();
        setActiveBtn(id);
      });
    });

    setActiveBtn("default");
  </script>
</body>
</html>
