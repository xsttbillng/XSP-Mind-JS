<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XSP-Mind-JS 可编辑示例</title>
  <link rel="stylesheet" href="../src/xsp-mind.css" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; }
    .layout { display: flex; width: 100%; height: 100%; }
    .sidebar {
      width: 240px; flex: 0 0 240px; box-sizing: border-box; border-right: 1px solid #e5e7eb;
      background: #f8fafc; padding: 16px 12px; overflow: auto;
    }
    .sidebar h3 { margin: 0 0 12px 0; font-size: 14px; color: #111827; }
    .nav-list { display: flex; flex-direction: column; gap: 8px; }
    .nav-item {
      display: block; padding: 10px 12px; border-radius: 8px; color: #334155;
      text-decoration: none; font-size: 13px; line-height: 1.4; background: transparent;
    }
    .nav-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 700; }
    .main { flex: 1; min-width: 0; }
    .wrap { width: 100%; height: 100%; display: flex; flex-direction: column; }
    #mind-root-edit { width: 100%; height: 55vh; background: #fafafa; }
    #mind-svg-edit { width: 2000px; height: 900px; background: #fff; }
    .toolbar { padding: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button { padding: 6px 10px; cursor: pointer; }
    #selected { color: #333; font-size: 13px; }
    .hint { color: #64748b; font-size: 12px; }
    #jsonOut {
      margin: 0; padding: 10px; width: 100%; height: 35vh; box-sizing: border-box;
      overflow: auto; background: #0b1020; color: #e6e6e6; font-size: 12px; line-height: 1.4;
      border: none; resize: vertical; font-family: Consolas, "Courier New", monospace;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h3>例子列表</h3>
      <nav class="nav-list">
        <a class="nav-item" href="../index.html">← 示例首页</a>
        <a class="nav-item" href="./index.html">示例1：基础 JSON 渲染</a>
        <a class="nav-item active" href="./editable.html">示例2：可编辑 + 实时 JSON</a>
        <a class="nav-item" href="./styled-nodes.html">示例3：节点样式 / CSS 主题</a>
        <a class="nav-item" href="./events.html">示例4：点击触发 JS</a>
        <a class="nav-item" href="./html-safety.html">示例5：HTML 安全 / sanitize</a>
        <a class="nav-item" href="./layouts.html">示例6：布局模式对比</a>
        <a class="nav-item" href="./animated-lines.html">示例7：连线虚线流动</a>
        <a class="nav-item" href="./line-styles.html">示例8：线型与多色连线</a>
      </nav>
    </aside>
    <main class="main">
  <div style="padding:12px 14px; font-size:14px; color:#333; font-family: Arial, sans-serif; border-bottom:1px solid #eee;">
    示例2：可编辑（增删 / 双击改字 / 布局 / 导入导出 JSON）+ 实时 JSON
  </div>
  <div class="wrap">
    <div class="toolbar">
      <button id="btnAdd">添加到所选下</button>
      <button id="btnDel">删除所选</button>
      <button id="btnLayoutRight">布局→右</button>
      <button id="btnLayoutLeft">布局←左</button>
      <button id="btnLayoutDown">布局↓下</button>
      <button id="btnResetView">重置视图</button>
      <input type="file" id="jsonFile" accept=".json,application/json" hidden />
      <button id="btnImportFile">选择 JSON 文件</button>
      <button id="btnImportText">加载下方 JSON</button>
      <button id="btnExportJson">导出 JSON</button>
      <button id="btnExportSvg">导出 SVG</button>
      <button id="btnExportPng">导出 PNG</button>
      <div id="selected">所选节点：无</div>
      <span class="hint">提示：点击选中 · 双击改文字 · 空白拖动画布 · 滚轮缩放</span>
    </div>

    <div id="mind-root-edit">
      <svg id="mind-svg-edit"></svg>
    </div>

    <textarea id="jsonOut" spellcheck="false">loading...</textarea>
  </div>
    </main>
  </div>

  <script src="../vendor/svg.min.js"></script>
  <script src="../src/xsp-mind.js"></script>
  <script>
    if (!window.SVG) {
      document.getElementById("jsonOut").value =
        "错误：SVG.js 未加载。请确认 ../vendor/svg.min.js 存在，并重新部署 GitHub Pages。";
      throw new Error("SVG.js not loaded");
    }

    const initData = [
      {
        "text": "根节点",
        "id": "root",
        "x": 60,
        "y": 180,
        "linestyle": "sline",
        "items": [
          { "text": "节点A", "id": "a", "x": 340, "y": 80, "linestyle": "sline", "items": [] },
          { "text": "节点B", "id": "b", "x": 340, "y": 170, "linestyle": "zline", "items": [] }
        ]
      }
    ];

    let selected = null;
    const jsonOut = document.getElementById("jsonOut");
    const selectedEl = document.getElementById("selected");

    const app = new XSPMindJS("mind-root-edit", "mind-svg-edit");
    try {
    app.initflow({
      option: {
        box: { width: 160, height: 40 },
        line: { color: "#00A1E7", width: 1.2, arrow: true },
        text: { color: "#00A1E7", size: 12 },
        ismove: true,
        editable: true,
        dblclickEdit: true,
        allowHtmlText: false,
        pan: true,
        zoom: true,
        onSelect: (node) => {
          if (!node) {
            selected = null;
            selectedEl.textContent = "所选节点：无";
            return;
          }
          selected = node.id;
          selectedEl.textContent = "所选节点：" + node.id + "（" + node.text + "）";
        },
        onChange: () => {
          jsonOut.value = app.toJSON(true);
        }
      },
      data: initData
    });
    jsonOut.value = app.toJSON(true);
    } catch (err) {
      jsonOut.value = "初始化失败: " + (err && err.message ? err.message : err);
      console.error(err);
    }

    function makeNewNode(text) {
      return {
        text: text || "新节点",
        id: "n_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
        linestyle: "sline",
        items: []
      };
    }

    document.getElementById("btnAdd").addEventListener("click", () => {
      const parentId = selected || "root";
      app.addNode(parentId, makeNewNode("子节点 " + (Date.now() % 1000)));
    });

    document.getElementById("btnDel").addEventListener("click", () => {
      if (!selected) return;
      if (String(selected) === "root") {
        alert("禁止删除 root（你可以改成允许删除）");
        return;
      }
      app.removeNode(selected);
    });

    function applyNamedLayout(mode) {
      app.option.layout = mode;
      app.applyLayout(mode);
      app.render();
      jsonOut.value = app.toJSON(true);
    }

    function importJsonText(text) {
      app.importJSON(text);
      if (app.option.layout && app.option.layout !== "none") {
        app.applyLayout(app.option.layout);
        app.render();
      }
      jsonOut.value = app.toJSON(true);
      selected = null;
      selectedEl.textContent = "所选节点：无";
    }

    document.getElementById("btnLayoutRight").addEventListener("click", () => applyNamedLayout("tree-right"));
    document.getElementById("btnLayoutLeft").addEventListener("click", () => applyNamedLayout("tree-left"));
    document.getElementById("btnLayoutDown").addEventListener("click", () => applyNamedLayout("tree-down"));

    document.getElementById("btnImportFile").addEventListener("click", () => {
      document.getElementById("jsonFile").click();
    });

    document.getElementById("jsonFile").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          importJsonText(reader.result);
        } catch (err) {
          alert("导入失败: " + (err && err.message ? err.message : err));
        }
        e.target.value = "";
      };
      reader.readAsText(file, "utf-8");
    });

    document.getElementById("btnImportText").addEventListener("click", () => {
      try {
        importJsonText(jsonOut.value);
      } catch (err) {
        alert("加载失败: " + (err && err.message ? err.message : err));
      }
    });

    document.getElementById("btnResetView").addEventListener("click", () => app.resetView());
    document.getElementById("btnExportJson").addEventListener("click", () => app.exportJSON());
    document.getElementById("btnExportSvg").addEventListener("click", () => app.exportSVG());
    document.getElementById("btnExportPng").addEventListener("click", () => {
      app.exportPNG().catch((e) => alert("PNG 导出失败: " + e));
    });
  </script>
</body>
</html>
