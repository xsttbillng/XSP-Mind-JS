<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XSP-Mind-JS Examples</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: var(--text); padding: 48px 24px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.02em; }
    .tagline { color: var(--muted); margin: 0 0 32px; line-height: 1.5; }
    .list { display: flex; flex-direction: column; gap: 12px; }
    a.card {
      display: block; padding: 16px 18px; background: var(--card);
      border: 1px solid #334155; border-radius: 12px; color: inherit;
      text-decoration: none; transition: border-color .15s, transform .15s;
    }
    a.card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .num { color: var(--accent); font-weight: 700; margin-right: 8px; }
    .desc { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .links { margin-top: 28px; font-size: 13px; color: var(--muted); }
    .links a { color: var(--accent); }
    .actions { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-block; padding: 10px 14px; border-radius: 10px;
      text-decoration: none; color: #e2e8f0; background: #0f172a;
      border: 1px solid #334155; transition: border-color .15s, transform .15s;
      font-size: 14px;
    }
    .btn:hover { border-color: var(--accent); transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>XSP-Mind-JS</h1>
    <p class="tagline">轻量 JSON 驱动流程图 / 思维图展示库。选择示例开始浏览（适合 GitHub Pages / 本地静态服务）。</p>
    <div class="list">
      <a class="card" href="./examples/index.html">
        <span class="num">示例 1</span>基础 JSON 渲染
        <div class="desc">流程图 / 思维导图 · 拖拽 · 富内容节点</div>
      </a>
      <a class="card" href="./examples/editable.html">
        <span class="num">示例 2</span>可编辑 + 实时 JSON
        <div class="desc">动态增删节点 · 下方实时数据</div>
      </a>
      <a class="card" href="./examples/styled-nodes.html">
        <span class="num">示例 3</span>节点样式 / CSS 主题
        <div class="desc">className · 图标状态 · 主题 C 粗线</div>
      </a>
      <a class="card" href="./examples/events.html">
        <span class="num">示例 4</span>点击触发 JS
        <div class="desc">onSelect 回调 · 记录点击时间</div>
      </a>
    </div>
    <div class="actions">
      <a class="btn" href="./README.md">查看 README</a>
      <a class="btn" href="https://github.com/xsttbillng/XSP-Mind-JS" target="_blank" rel="noreferrer">GitHub Repo</a>
    </div>
    <p class="links">
      <a href="./README.md">README</a> ·
      <a href="./SECURITY.md">Security</a> ·
      <a href="./docs/OPENSOURCE.md">发布清单</a>
    </p>
  </div>
</body>
</html>
